services:
  # The Official LangGraph API Server
  langgraph-api:
    build:
      context: ./lg
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER}/lg:/app
    environment:
      - MCP_RESEARCH_URL=http://research-server:3000/mcp
      - DATABASE_URI=postgres://postgres:postgres@postgres:5432/postgres
      - REDIS_URI=redis://redis:6379
      - LANGCHAIN_TRACING_V2=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
    depends_on:
      - postgres
      - redis
      - mcp-research
    networks:
      - agent-net

  # Required for Persistence (Official server needs this)
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: langgraph
      RUN_MIGRATIONS: "true"
    networks:
      - agent-net

  # Required for Task Queue/Streaming
  redis:
    image: redis:7
    networks:
      - agent-net

  # Your other microservices
  # Research MCP Server (Streaming HTTP)
  mcp-research:
    build:
      context: ./mcp_servers/search
      dockerfile: Dockerfile
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    networks:
      - agent-net

networks:
  agent-net:
    external: true